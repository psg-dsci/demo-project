name: CI/CD → Deploy to EC2

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  APP_DIR: /home/ec2-user/app   # Change this if using ubuntu → /home/ubuntu/app

jobs:
  # ─────────────────────────────────────────
  # JOB 1: Run tests
  # ─────────────────────────────────────────
  test:
    name: 🧪 Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  # ─────────────────────────────────────────
  # JOB 2: Deploy to EC2 (only on main push)
  # ─────────────────────────────────────────
  deploy:
    name: 🚀 Deploy to EC2
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            echo "📦 Starting deployment..."

            # Go to app directory (create if not exists)
            mkdir -p ${{ env.APP_DIR }}
            cd ${{ env.APP_DIR }}

            # Pull latest code
            if [ -d ".git" ]; then
              git pull origin main
            else
              git clone ${{ secrets.REPO_URL }} .
            fi

            # Install production dependencies
            npm ci --omit=dev

            # Set environment variables
            export NODE_ENV=production
            export APP_VERSION=${{ github.sha }}
            export PORT=3000

            # Restart app with PM2
            pm2 describe app > /dev/null 2>&1
            if [ $? -eq 0 ]; then
              pm2 restart app --update-env
            else
              pm2 start src/app.js --name app \
                --env production \
                -e ${{ env.APP_DIR }}/logs/error.log \
                -o ${{ env.APP_DIR }}/logs/out.log
            fi

            pm2 save
            echo "✅ Deployment complete!"

      - name: Notify on success
        if: success()
        run: |
          echo "🎉 Deployed commit ${{ github.sha }} to EC2 successfully!"

      - name: Notify on failure
        if: failure()
        run: |
          echo "❌ Deployment failed for commit ${{ github.sha }}"
