name: CI/CD → Deploy to EC2

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  APP_DIR: /home/ec2-user/app   # Change if ubuntu → /home/ubuntu/app

jobs:
  # ─────────────────────────────────────────
  # JOB 1: Test
  # ─────────────────────────────────────────
  test:
    name: 🧪 Test
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node (NO CACHE = no lock file error)
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: 📦 Install dependencies (auto-detect)
        run: |
          echo "Checking for lock file..."

          if [ -f package-lock.json ]; then
            echo "✅ Found package-lock.json → using npm ci"
            npm ci
          elif [ -f yarn.lock ]; then
            echo "✅ Found yarn.lock → using yarn"
            npm install -g yarn
            yarn install --frozen-lockfile
          else
            echo "⚠️ No lock file → generating one"
            npm install
          fi

      - name: 🧪 Run tests (safe)
        run: |
          if npm run | grep -q "test"; then
            npm test
          else
            echo "⚠️ No test script found → skipping"
          fi

  # ─────────────────────────────────────────
  # JOB 2: Deploy
  # ─────────────────────────────────────────
  deploy:
    name: 🚀 Deploy to EC2
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🚀 Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            set -e   # 🚨 fail fast

            echo "📦 Starting deployment..."

            mkdir -p ${{ env.APP_DIR }}
            cd ${{ env.APP_DIR }}

            # Clone or pull repo
            if [ -d ".git" ]; then
              echo "🔄 Pulling latest code..."
              git pull origin main
            else
              echo "📥 Cloning repo..."
              git clone ${{ secrets.REPO_URL }} .
            fi

            # Install Node if missing
            if ! command -v npm &> /dev/null; then
              echo "⚙️ Installing Node.js..."
              curl -fsSL https://rpm.nodesource.com/setup_20.x | sudo bash -
              sudo yum install -y nodejs
            fi

            # Install PM2 if missing
            if ! command -v pm2 &> /dev/null; then
              echo "⚙️ Installing PM2..."
              sudo npm install -g pm2
            fi

            # Install dependencies safely
            echo "📦 Installing dependencies..."
            if [ -f package-lock.json ]; then
              npm ci --omit=dev
            elif [ -f yarn.lock ]; then
              npm install -g yarn
              yarn install --production
            else
              npm install --omit=dev
            fi

            # Environment setup
            export NODE_ENV=production
            export APP_VERSION=${{ github.sha }}
            export PORT=3000

            mkdir -p logs

            # Restart app safely
            echo "🔁 Restarting application..."

            if pm2 describe app > /dev/null 2>&1; then
              pm2 restart app --update-env
            else
              pm2 start src/app.js --name app \
                --env production \
                -e logs/error.log \
                -o logs/out.log
            fi

            pm2 save

            echo "✅ Deployment complete!"

      - name: 🎉 Success
        if: success()
        run: echo "Deployment successful 🚀"

      - name: ❌ Failure
        if: failure()
        run: echo "Deployment failed 💥"