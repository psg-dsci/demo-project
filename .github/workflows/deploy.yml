name: CI/CD → Deploy to EC2

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  APP_DIR: /home/ec2-user/app   # Change if ubuntu → /home/ubuntu/app

jobs:
  # ─────────────────────────────────────────
  # JOB 1: Run tests
  # ─────────────────────────────────────────
  test:
    name: 🧪 Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies (safe)
        run: |
          if [ -f package-lock.json ]; then
            echo "Using npm ci"
            npm ci
          else
            echo "No lock file → using npm install"
            npm install
          fi

      - name: Run tests
        run: npm test

  # ─────────────────────────────────────────
  # JOB 2: Deploy to EC2
  # ─────────────────────────────────────────
  deploy:
    name: 🚀 Deploy to EC2
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            echo "📦 Starting deployment..."

            mkdir -p ${{ env.APP_DIR }}
            cd ${{ env.APP_DIR }}

            # Clone or pull
            if [ -d ".git" ]; then
              git pull origin main
            else
              git clone ${{ secrets.REPO_URL }} .
            fi

            # Install dependencies safely
            if [ -f package-lock.json ]; then
              echo "Using npm ci"
              npm ci --omit=dev
            else
              echo "No lock file → using npm install"
              npm install --omit=dev
            fi

            export NODE_ENV=production
            export APP_VERSION=${{ github.sha }}
            export PORT=3000

            # Ensure logs dir exists
            mkdir -p logs

            # PM2 restart/start
            pm2 describe app > /dev/null 2>&1
            if [ $? -eq 0 ]; then
              pm2 restart app --update-env
            else
              pm2 start src/app.js --name app \
                --env production \
                -e logs/error.log \
                -o logs/out.log
            fi

            pm2 save
            echo "✅ Deployment complete!"

      - name: Notify on success
        if: success()
        run: echo "🎉 Deployed commit ${{ github.sha }} successfully!"

      - name: Notify on failure
        if: failure()
        run: echo "❌ Deployment failed!"
